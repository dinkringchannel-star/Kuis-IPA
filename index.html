let index = 0;
let skor = 0;

function tampilSoal() {
    let s = soalData[index];
    document.getElementById("soal").innerText = s.q;
    document.getElementById("nomor").innerText = 
        "Soal " + (index+1) + " / " + soalData.length;

    let html = "";
    s.a.forEach((pil,i)=>{
        html += `<button onclick="jawab(${i})">${pil}</button>`;
    });
    document.getElementById("pilihan").innerHTML = html;

    document.getElementById("progress").style.width =
        ((index)/soalData.length)*100 + "%";
}

// SUARA NGOMONG
function ngomong(teks){
    let speech = new SpeechSynthesisUtterance(teks);
    speech.lang = "id-ID";
    speech.rate = 1;
    speech.pitch = 1;
    speechSynthesis.speak(speech);
}

let audioBenar = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
let audioSalah = new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3");

// supaya siap diputar
audioBenar.load();
audioSalah.load();

// unlock audio di HP
document.body.addEventListener("click", function aktifkanAudio(){
    audioBenar.play().then(()=> audioBenar.pause());
    audioSalah.play().then(()=> audioSalah.pause());
    document.body.removeEventListener("click", aktifkanAudio);
});

function bunyiBenar(){
    audioBenar.currentTime = 0;
    audioBenar.play();
}

function bunyiSalah(){
    audioSalah.currentTime = 0;
    audioSalah.play();
}

function jawab(pilih){
    if(pilih == soalData[index].k){
        skor++;
		document.getElementById("benarSound").play();
        ngomong("Jawaban benar!");
    }else{
		document.getElementById("salahSound").play();
        ngomong("Jawaban salah!");
    }

    index++;
    setTimeout(()=>{
        document.getElementById("notif").innerText = "";
        if(index < soalData.length){
            tampilSoal();
        }else{
            selesai();
        }
    },700);
}



function selesai(){
    document.getElementById("soal").innerText = "?? Kuis Selesai!";
    document.getElementById("pilihan").innerHTML = "";
    document.getElementById("skor").innerText = 
        "Skor kamu: " + skor + " / " + soalData.length;

    document.getElementById("progress").style.width = "100%";
	ngomong("Kuis selesai. Skor kamu " + skor);
    document.getElementById("ulangBtn").style.display = "block";
}

function ulang(){
    index = 0;
    skor = 0;
    document.getElementById("ulangBtn").style.display = "none";
    document.getElementById("skor").innerText = "";
    tampilSoal();
}

tampilSoal();

</script>
